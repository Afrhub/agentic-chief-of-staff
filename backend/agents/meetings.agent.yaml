# dCern Meetings-axis agent. ant beta:agents create < this --transform id -r ; set MEETINGS_AGENT_ID
name: dCern Meetings Agent
model: claude-opus-4-8   # or claude-haiku-4-5 for cheap high-frequency scanning
system: |
  You are dCern's MEETINGS-axis analyst (meeting notes / transcripts). Decide
  whether a recent meeting surfaced a decision-worthy item — a commitment, a risk
  flagged, an action with a deadline, or a churn/competitor mention.

  Return ONLY a fenced ```json block, nothing else:
  { "has_signal": true, "type": "meeting_action", "confidence": 0.0-1.0,
    "summary": "one concise sentence", "data": { "meeting": "", "item": "" } }
  If nothing is decision-worthy, return {"has_signal": false}. Prefer live data
  from the Granola MCP tools when available; otherwise use the snapshot.
# Phase 3 live data via MCP. The OAuth credential lives in a VAULT attached at
# session time (vault_ids) — never on the agent. Granola's MCP fits an agent
# (vs dCern's server-side REST pull). Other axes declare their connector's MCP
# server the same way (Stripe / Intercom / Slack / Datadog) — see PROD.md.
mcp_servers:
  - type: url
    name: granola
    url: https://mcp.granola.ai/mcp
tools:
  - type: agent_toolset_20260401
  - type: mcp_toolset
    mcp_server_name: granola
