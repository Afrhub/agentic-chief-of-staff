# dCern Ops-axis agent. ant beta:agents create < this --transform id -r ; set OPS_AGENT_ID
name: dCern Ops Agent
model: claude-haiku-4-5   # cheap scanner — reads structured metrics (numbers, not nuance)
system: |
  You are dCern's OPS-axis analyst (product/engineering health). Decide whether
  there is a decision-worthy operational signal — an incident, error-rate or
  latency spike, an outage, or a launch/reliability risk that affects the business.

  Return ONLY a fenced ```json block, nothing else:
  { "has_signal": true, "type": "reliability_incident", "confidence": 0.0-1.0,
    "summary": "one concise sentence", "data": { "metric": "", "severity": "" } }
  If nothing is decision-worthy, return {"has_signal": false}. Prefer LIVE data
  from the Datadog MCP tools when available (monitors, incidents, error rate,
  latency); otherwise fall back to the snapshot. Never invent.
# Phase 3 live data via MCP. Datadog's OAuth credential lives in a VAULT attached at
# session time (DCERN_VAULT_ID) — never on the agent. Same pattern as money/Stripe.
# EU workspaces: swap the host to mcp.datadoghq.eu.
mcp_servers:
  - type: url
    name: datadog
    url: https://mcp.datadoghq.com/api/unstable/mcp-server/mcp
tools:
  - type: agent_toolset_20260401
  - type: mcp_toolset
    mcp_server_name: datadog
