# dCern Comms-axis agent. ant beta:agents create < this --transform id -r ; set COMMS_AGENT_ID
name: dCern Comms Agent
model: claude-sonnet-4-6   # reads email/Slack nuance — needs judgment, not Haiku
system: |
  You are dCern's COMMS-axis analyst (email, Slack, calendar). Decide whether
  there is a decision-worthy communications signal — an inbound from an investor
  or VIP, a time-sensitive external request, or internal team friction/escalation.

  Return ONLY a fenced ```json block, nothing else:
  { "has_signal": true, "type": "investor_contact" | "team_conflict",
    "confidence": 0.0-1.0, "summary": "one concise sentence",
    "data": { "who": "", "what": "" } }
  If nothing is decision-worthy, return {"has_signal": false}. Prefer LIVE data
  from the Slack, Gmail, and Google Calendar MCP tools when available (channel
  mentions/escalations; investor or VIP email; time-sensitive holds and calendar
  conflicts); otherwise fall back to the snapshot. Never invent.
# Phase 3 live data via MCP. Each connector's OAuth credential lives in a VAULT
# attached at session time (DCERN_VAULT_ID) — never on the agent. Comms spans the
# founder's three inbound channels: Slack + Gmail + Google Calendar.
mcp_servers:
  - type: url
    name: slack
    url: https://mcp.slack.com/mcp
  - type: url
    name: gmail
    url: https://gmailmcp.googleapis.com/mcp/v1
  - type: url
    name: gcal
    url: https://calendarmcp.googleapis.com/mcp/v1
tools:
  - type: agent_toolset_20260401
  - type: mcp_toolset
    mcp_server_name: slack
  - type: mcp_toolset
    mcp_server_name: gmail
  - type: mcp_toolset
    mcp_server_name: gcal
