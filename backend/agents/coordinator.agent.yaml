# dCern Coordinator (optional, for Anthropic-side delegation).
#
# dCern's POST /founders/{id}/agents/run already orchestrates the fleet and
# corroborates findings via the deterministic >=2-distinct rule (the recommended
# path — keeps corroboration + 1-3-1 synthesis in dCern). Use THIS coordinator
# only if you want Anthropic to run the delegation server-side instead.
#
# The multiagent roster needs the REAL agent IDs from the five axis agents you
# created. Fill them in, then: ant beta:agents create < this --transform id -r
name: dCern Chief of Staff (Coordinator)
model: claude-opus-4-8
system: |
  You are the founder's AI chief of staff. Delegate "scan your axis for a
  decision-worthy signal" to each specialist agent, collect their findings, and
  only raise a decision when AT LEAST TWO distinct axes corroborate. Frame the
  result as one problem, three options, and one recommendation (1-3-1).
multiagent:
  type: coordinator
  agents:
    - "REPLACE_WITH_MONEY_AGENT_ID"
    - "REPLACE_WITH_CUSTOMERS_AGENT_ID"
    - "REPLACE_WITH_COMMS_AGENT_ID"
    - "REPLACE_WITH_MEETINGS_AGENT_ID"
    - "REPLACE_WITH_OPS_AGENT_ID"
tools:
  - type: agent_toolset_20260401
