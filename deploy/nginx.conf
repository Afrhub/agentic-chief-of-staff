# Serves the built frontend and reverse-proxies API paths to the backend.
# Frontend uses same-origin relative URLs (REACT_APP_API_URL unset), so the
# browser never talks to the backend directly — everything is one origin.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # --- API → backend (founder data stays inside this stack) ---
    location ~ ^/(founders|slack|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
